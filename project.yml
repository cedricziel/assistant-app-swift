name: Assistant
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: '26.2'
    macOS: '26.2'
  bundleIdPrefix: com.cedricziel.assistant.app
configs:
  Debug: debug
  Release: release
settings:
  base:
    DEVELOPMENT_TEAM: WPW3QSLZ2F
    SWIFT_VERSION: 6.2
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: YES
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_STRING_CATALOG_SYMBOL_GENERATION: YES
packages:
  AssistantShared:
    path: AssistantShared
targets:
  Assistant iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/ShellXPC
    resources:
      - path: Resources/Shared
    dependencies:
      - package: AssistantShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.assistant.app.ios
        IPHONEOS_DEPLOYMENT_TARGET: '26.2'
        CODE_SIGN_ENTITLEMENTS: Configurations/Assistant-iOS.entitlements
    info:
      path: Configurations/Assistant-iOS-Info.plist
      properties:
        UILaunchScreen:
          UIColorName: AccentColor
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: ''
        UISupportedInterfaceOrientations:
          iPhone:
            - UIInterfaceOrientationPortrait
            - UIInterfaceOrientationLandscapeLeft
            - UIInterfaceOrientationLandscapeRight
          iPad:
            - UIInterfaceOrientationPortrait
            - UIInterfaceOrientationPortraitUpsideDown
            - UIInterfaceOrientationLandscapeLeft
            - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
  Assistant macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/ShellXPC
    resources:
      - path: Resources/Shared
    dependencies:
      - package: AssistantShared
      - target: ShellAgent
        embed: true
        codeSign: true
        copy:
          destination: executables
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.assistant.app.macos
        MACOSX_DEPLOYMENT_TARGET: '26.2'
        CODE_SIGN_ENTITLEMENTS: Configurations/Assistant-macOS.entitlements
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    info:
      path: Configurations/Assistant-macOS-Info.plist
      properties:
        NSPrincipalClass: NSApplication
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSUIElement: false
    postBuildScripts:
      - name: Copy LaunchAgent plist
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchAgents"
          cp "${SRCROOT}/Configurations/com.cedricziel.assistant.app.shell-agent.plist" \
             "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchAgents/"
        basedOnDependencyAnalysis: false
  ShellAgent:
    type: tool
    platform: macOS
    sources:
      - path: Sources/Agent
      - path: Sources/ShellXPC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.assistant.app.shell-agent
        PRODUCT_NAME: com.cedricziel.assistant.app.shell-agent
        MACOSX_DEPLOYMENT_TARGET: '26.2'
        SKIP_INSTALL: YES
        ENABLE_HARDENED_RUNTIME: YES
schemes:
  Assistant iOS:
    shared: true
    build:
      targets:
        Assistant iOS: all
    run:
      config: Debug
  Assistant macOS:
    shared: true
    build:
      targets:
        Assistant macOS: all
    run:
      config: Debug
  ShellAgent:
    shared: true
    build:
      targets:
        ShellAgent: all
    run:
      config: Debug
  Assistant (All):
    shared: true
    build:
      targets:
        Assistant iOS: all
        Assistant macOS: all
        ShellAgent: all
    run:
      config: Debug
    archive:
      config: Release
